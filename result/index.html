<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海高考录取数据查询 (2022–2025)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100%}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px;line-height:1.5}

/* ── Top bar ── */
#topBar{background:#0f172a;color:#fff;padding:10px 18px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
#topBar h1{font-size:15px;font-weight:700;letter-spacing:-0.2px}
#topBar .sub{font-size:11px;opacity:.55;margin-top:2px}

/* ── Tab pills ── */
.btn-tab{font-family:inherit;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);padding:5px 13px;font-size:12px;font-weight:600;border-radius:100px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-tab:hover{background:rgba(255,255,255,.18);color:#fff}
.btn-tab.active{background:#fff;color:#0f172a;border-color:#fff}
.btn-print{font-family:inherit;background:transparent;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.1);padding:5px 13px;font-size:11px;font-weight:600;border-radius:100px;cursor:pointer;transition:all .15s}

/* ── Filter bar ── */
#ctrlRow{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 14px 8px 0;position:sticky;top:48px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.06)}
#ctrlRowInner{display:flex;flex-wrap:nowrap;gap:7px;align-items:end;overflow-x:auto;padding-left:14px;-webkit-overflow-scrolling:touch}
.ctrl-group{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.ctrl-group label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.ctrl-group input,.ctrl-group select{padding:5px 7px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;background:#fff;font-family:inherit}
.ctrl-group input:focus,.ctrl-group select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.ctrl-group input[type=number]::-webkit-outer-spin-button,
.ctrl-group input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ctrl-group input[type=number]{-moz-appearance:textfield}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-ghost{background:#fff;color:#1a1a2e;border:1px solid #e2e8f0}.btn-ghost:hover{background:#f8fafc}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── Year chips ── */
.yr-chips{display:flex;gap:3px;flex-wrap:wrap;align-items:center;max-height:44px;overflow-y:auto}
.yr-chip{font-family:inherit;font-size:11px;font-weight:600;padding:3px 9px;border:1px solid #cbd5e1;border-radius:100px;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .12s;user-select:none}
.yr-chip:hover{background:#f1f5f9;border-color:#94a3b8}
.yr-chip.on{background:#2563eb;color:#fff;border-color:#2563eb}

/* ── Province dropdown ── */
.prov-wrap{position:relative}
.prov-btn{padding:5px 8px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:4px;min-width:68px;white-space:nowrap;user-select:none;font-family:inherit}
.prov-btn:hover{border-color:#2563eb}
.prov-btn .cnt{font-size:10px;font-weight:700;color:#2563eb}
.prov-panel{position:absolute;z-index:200;background:#fff;border:1px solid #e2e8f0;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:200px;max-height:320px;overflow-y:auto;display:none;padding:4px 0}
.prov-panel.show{display:block}
.prov-panel .prov-row{display:flex;align-items:center;gap:6px;padding:4px 10px;cursor:pointer;font-size:12px}
.prov-panel .prov-row:hover{background:#eff6ff}
.prov-panel .prov-row.all{font-weight:700;color:#2563eb;border-bottom:1px solid #e2e8f0;margin-bottom:2px;padding-bottom:6px}
.prov-panel .prov-row input[type=checkbox]{margin:0;accent-color:#2563eb}

/* ── Autocomplete ── */
.ac-wrap{position:relative}
.ac-drop{position:absolute;z-index:200;background:#fff;border:1px solid #e2e8f0;border-radius:0 0 6px 6px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:320px;overflow-y:auto;display:none;min-width:120px}
.ac-drop.show{display:block}
.ac-item{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ac-item:hover,.ac-item.sel{background:#eff6ff}
.ac-item .nm{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item .pv{font-size:10px;color:#94a3b8;flex-shrink:0}
.ac-item.sel{outline:2px solid #2563eb;outline-offset:-2px}

/* ── Stat row ── */
#statRow{padding:5px 14px;font-size:11px;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0}
#statRow strong{color:#1a1a2e}

/* ── Table ── */
.tblOuter{margin:6px 10px 6px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);background:#fff;overflow-x:auto}
.tblHd{width:max-content;min-width:100%;overflow:visible;border-bottom:2px solid #cbd5e1}
.tblBd{width:max-content;min-width:100%;overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 230px)}
.tblHd table,.tblBd table{width:max-content;min-width:100%}
.tblBd thead{display:none}
table{border-collapse:collapse;font-variant-numeric:tabular-nums}
th,td{padding:4px 4px;white-space:nowrap;font-size:12px}
th{background:#f1f5f9;font-weight:700;color:#64748b;border-bottom:1px solid #e2e8f0;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
th.yr{background:#e2e8f0;color:#1e40af;font-size:12px;font-weight:800;min-width:36px;letter-spacing:0;text-transform:none}
th.sb{font-size:10px;font-weight:500;color:#94a3b8;min-width:20px;text-transform:none;letter-spacing:0}
th.lbl{background:#e2e8f0;color:#334155;text-align:left;text-transform:none;letter-spacing:0;white-space:normal}
td.sch{font-weight:600;text-align:left;max-width:110px;white-space:normal;word-break:break-all;overflow-wrap:break-word;vertical-align:top}
td.grp{font-family:"SF Mono","Cascadia Code",monospace;font-size:11px;text-align:left;color:#475569}
td.maj{text-align:left;max-width:170px;white-space:normal;word-break:break-all;overflow-wrap:break-word;vertical-align:top}
td.subj{text-align:left;font-size:11px;color:#64748b}
td.sc{text-align:center;font-weight:500}
.sc-min{font-weight:700;font-size:12px}.sc-avg{color:#64748b;font-size:11px}.sc-cnt{color:#94a3b8;font-size:10px}.sc-rk{font-size:9px;color:#94a3b8}
th.yr+th.yr{border-left:2px solid #cbd5e1}
td.yr-st,th.yr-st{border-left:2px solid #cbd5e1}
.yr-first{border-left:2px solid #94a3b8}
.sc-cen{color:#d97706;font-style:italic}.nv{color:#ccc}
tbody td{border-bottom:1px solid #f1f5f9}
/* content-visibility removed: caused bottom-row clipping in toudang/admission tables */
tbody tr:hover td{background:#dbeafe;box-shadow:inset 0 0 0 1px #93c5fd}
tr.grp1 td{border-top:2px solid #e2e8f0}
.msg{padding:60px 20px;text-align:center;color:#64748b;font-size:14px}
.srt{color:#2563eb;font-size:10px}.sorted-desc .srt{color:#1e40af}.sorted-asc .srt{color:#2563eb}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:1px;line-height:1.4}
.badge-985{background:#dc2626;color:#fff}
.badge-211{background:#2563eb;color:#fff}
.badge-dy{background:#7c3aed;color:#fff}
.grade{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:28px;text-align:center;line-height:1.4}
.grade-ap{background:#dc2626;color:#fff}.grade-a{background:#f97316;color:#fff}.grade-am{background:#eab308;color:#fff}
.grade-bp{background:#22c55e;color:#fff}.grade-b{background:#14b8a6;color:#fff}.grade-bm{background:#06b6d4;color:#fff}
.grade-cp{background:#8b5cf6;color:#fff}.grade-c{background:#a855f7;color:#fff}.grade-cm{background:#d8b4fe;color:#4a1d96}
th.sorted-desc{background:#dbeafe!important}th.sorted-asc{background:#dbeafe!important}

/* ── Context menu ── */
#ctxMenu{display:none;position:fixed;z-index:300;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:4px 0;min-width:170px;font-size:12px}

/* ── Loading ── */
#loadingOverlay{display:none;position:fixed;top:120px;left:0;right:0;bottom:0;z-index:250;pointer-events:none;background:rgba(240,242,245,.5);justify-content:center;align-items:flex-start;padding-top:120px}
#loadingOverlay.show{display:flex}
#loadingOverlay .spinner{background:#fff;border-radius:16px;padding:24px 32px;box-shadow:0 4px 24px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;gap:12px;animation:fadeInUp .2s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lds-ring{display:inline-block;width:36px;height:36px;position:relative}
.lds-ring div{box-sizing:border-box;display:block;position:absolute;width:28px;height:28px;margin:4px;border:3px solid #2563eb;border-radius:50%;animation:lds-ring 1s cubic-bezier(.5,0,.5,1) infinite;border-color:#2563eb transparent transparent transparent}
.lds-ring div:nth-child(1){animation-delay:-.45s}
.lds-ring div:nth-child(2){animation-delay:-.3s}
.lds-ring div:nth-child(3){animation-delay:-.15s}
@keyframes lds-ring{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ── Mobile ── */
@media(max-width:640px){
  #topBar{padding:8px 10px}#topBar h1{font-size:13px}#topBar .sub{font-size:10px}
  #ctrlRow{padding:6px 8px 6px 0;top:40px}.tblBd{max-height:calc(100vh - 240px)}th,td{padding:3px 4px}
}

/* ── Print ── */
@media print{
  html,body{overflow:visible;height:auto}
  body{background:#fff;font-size:11px}
  #topBar,#ctrlRow,.btn-print{display:none!important}
  #statRow{position:static!important;background:#fff;border-bottom:1px solid #999;color:#000;padding:4px 0}
  .tblOuter{margin:0;box-shadow:none;border-radius:0;border:1px solid #999;overflow-x:visible}
  .tblHd{overflow:visible;border-bottom:1px solid #999}
  .tblBd{overflow:visible;overflow-x:visible;max-height:none}
  .tblBd thead{display:table-header-group}
  .tblHd{display:none}
  th{position:static!important;background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th.yr,td.sc-min,.badge,.grade{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th,td{white-space:normal;padding:3px 4px}
  tbody tr{content-visibility:visible}
  tr.grp1 td{border-top:1px solid #999}
  tbody td{border-bottom:1px solid #eee}
}
</style>
</head>
<body>

<header id="topBar">
  <div>
    <h1>上海高考本科普通批录取分数 (2022–2025)</h1>
    <div class="sub">数据来源：上海市教育考试院 · <span id="hdr">加载中…</span></div>
  </div>
  <div style="display:flex;gap:6px;align-items:center" role="tablist">
    <button class="btn-tab active" id="btnAdm" role="tab" aria-selected="true" onclick="switchView('admission')">录取数据</button>
    <button class="btn-tab" id="btnTd" role="tab" aria-selected="false" onclick="switchView('toudang')">投档线</button>
    <button class="btn-tab" id="btnYd" role="tab" aria-selected="false" onclick="switchView('yiduan')">一分一段</button>
    <button class="btn-tab" id="btnXk" role="tab" aria-selected="false" onclick="switchView('xueke')">学科评估</button>
    <button class="btn-tab" id="btnCmp" role="tab" aria-selected="false" onclick="switchView('compare')">对比列表 <span id="cmpBadge" style="background:rgba(255,255,255,.15);border-radius:100px;padding:0 6px;font-size:10px;display:none">0</span></button>
    <button class="btn-tab" id="btnGuide" role="tab" aria-selected="false" onclick="switchView('guide')">使用指南</button>
    <button class="btn-print" onclick="window.print()">打印</button>
  </div>
</header>

<main>
<div id="ctrlRow"><div id="ctrlRowInner">
  <!-- 院校 -->
  <div class="ctrl-group ac-wrap flt-vis"><label for="fltSchool">院校</label><input type="text" id="fltSchool" placeholder="输入院校名称…" autocomplete="off" style="min-width:150px"><div class="ac-drop" id="acDrop" role="listbox"></div></div>
  <!-- 省份 -->
  <div class="ctrl-group prov-wrap flt-vis" id="provWrap"><label>省份</label><button class="prov-btn" id="provBtn" type="button" onclick="toggleProvPanel()">全部<span class="cnt"></span><span style="font-size:10px;color:#94a3b8"> ▾</span></button><div class="prov-panel" id="provPanel"><div class="prov-row all" onclick="provToggleAll()"><input type="checkbox" id="provCkAll" checked onchange="provToggleAll()"><span>全选 / 全不选</span></div></div></div>
  <!-- 专业 -->
  <div class="ctrl-group ac-wrap flt-vis"><label for="fltMajor">专业</label><input type="text" id="fltMajor" placeholder="如：人工智能…" autocomplete="off" style="min-width:130px"><div class="ac-drop" id="acMajor" role="listbox"></div></div>
  <!-- 科目 -->
  <div class="ctrl-group flt-vis"><label for="fltSubject">科目</label><select id="fltSubject"><option value="">全部</option></select></div>
  <!-- 分数/位次 -->
  <div class="ctrl-group flt-vis"><label for="fltMin">最低分 ≥</label><input type="number" id="fltMin" placeholder="400" style="width:48px"></div>
  <div class="ctrl-group flt-vis"><label for="fltMax">最高分 ≤</label><input type="number" id="fltMax" placeholder="580" style="width:48px"></div>
  <div class="ctrl-group flt-vis"><label for="fltRankMin">位次范围查询</label><input type="number" id="fltRankMin" placeholder="1000" style="width:64px"></div>
  <span class="flt-vis" style="align-self:end;margin-bottom:4px;padding:0 3px;font-size:12px;color:#64748b;font-weight:500">到</span>
  <div class="ctrl-group flt-vis"><label for="fltRankMax" style="visibility:hidden">到</label><input type="number" id="fltRankMax" placeholder="5000" style="width:64px"></div>
  <!-- 年份 -->
  <div class="ctrl-group flt-vis" id="yrChipGrp"><label>年份</label><div class="yr-chips" id="yrChips"></div></div>
  <!-- 一分一段专用 -->
  <div class="ctrl-group" id="rankGrp" style="display:none"><label for="rankScore">查位次</label><input type="number" id="rankScore" placeholder="输入分数" style="min-width:72px" onkeydown="if(event.key==='Enter')rankLookup()"></div>
  <div id="rankResult" style="display:none;font-size:11px;color:#1e40af;padding:4px 8px;align-self:end"></div>
  <!-- 学科评估专用 -->
  <div class="ctrl-group ac-wrap" id="xkSchGrp" style="display:none"><label for="xkSchool">院校</label><input type="text" id="xkSchool" placeholder="输入院校…" autocomplete="off" style="min-width:130px"><div class="ac-drop" id="acXkSch" role="listbox"></div></div>
  <div class="ctrl-group ac-wrap" id="xkDiscGrp" style="display:none"><label for="xkDiscipline">学科</label><input type="text" id="xkDiscipline" placeholder="如：计算机…" autocomplete="off" style="min-width:130px"><div class="ac-drop" id="acXkDisc" role="listbox"></div></div>
  <div class="ctrl-group" id="xkCatGrp" style="display:none"><label for="xkCategory">门类</label><select id="xkCategory"><option value="">全部</option></select></div>
  <!-- 按钮 -->
  <button class="btn btn-blue" onclick="search()" id="btnSearch">查询</button>
  <button class="btn btn-ghost" onclick="resetFilters()" id="btnReset">重置</button>
</div></div>

<div id="statRow">输入条件后点击"查询"开始</div>
<div id="ctxMenu"><div id="ctxCompare" style="padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600;color:#1a1a2e" onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background=''">📋 添加到对比列表</div></div>
<div id="main" role="tabpanel"><div class="msg">请在上方输入查询条件后点击"查询"按钮</div></div>
<div id="loadingOverlay"><div class="spinner"><div class="lds-ring"><div></div><div></div><div></div><div></div></div><span style="font-size:13px;font-weight:600;color:#64748b">加载中...</span></div></div>
</main>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   All functionality preserved — compact, zero-dependency
   ═══════════════════════════════════════════════════════════════════════════ */
var YEARS=[],currentData=null,currentSort={field:'default',year:0,dir:'desc'},activeView='admission',yiduanCache=null,toudangRawData=null,schoolInfo={},cmpSort={field:'default',dir:'asc'},STATIC={},ALL_SCHOOLS=[],ALL_MAJORS=[],XK_SCHOOLS=[],XK_DISCIPLINES=[],STATIC_LOADED=false;

// ── View switching ──
function switchView(view){
  if(activeView===view) return;
  var tabs={admission:"btnAdm",toudang:"btnTd",yiduan:"btnYd",xueke:"btnXk",compare:"btnCmp",guide:"btnGuide"};
  for(var k in tabs){var b=document.getElementById(tabs[k]);var on=k===view;b.classList.toggle("active",on);b.setAttribute("aria-selected",on?"true":"false")}
  activeView=view;
  // Allow body scroll only for guide view
  document.body.style.overflow=view==='guide'?"auto":"hidden";
  document.documentElement.style.overflow=view==='guide'?"auto":"hidden";
  var filters=document.querySelectorAll(".flt-vis");
  var rankGrp=document.getElementById("rankGrp"),rankRes=document.getElementById("rankResult");
  var btnSearch=document.getElementById("btnSearch"),btnReset=document.getElementById("btnReset");
  var xkSchGrp=document.getElementById("xkSchGrp"),xkDiscGrp=document.getElementById("xkDiscGrp"),xkCatGrp=document.getElementById("xkCatGrp");

  if(view==='admission'){
    _rebuildYearChips(STATIC.pivot.years);
    YEARS=STATIC.pivot.years;
    filters.forEach(function(e){e.style.display=""});rankGrp.style.display="none";rankRes.style.display="none";
    btnSearch.style.display="";btnReset.style.display="";
    xkSchGrp.style.display="none";xkDiscGrp.style.display="none";xkCatGrp.style.display="none";
  }else if(view==='xueke'){
    filters.forEach(function(e){e.style.display="none"});rankGrp.style.display="none";rankRes.style.display="none";
    btnSearch.style.display="";btnReset.style.display="none";
    xkSchGrp.style.display="";xkDiscGrp.style.display="";xkCatGrp.style.display="";
    loadXuekeInit();return;
  }else if(view==='compare'){
    filters.forEach(function(e){e.style.display="none"});rankGrp.style.display="none";rankRes.style.display="none";
    btnSearch.style.display="none";btnReset.style.display="none";
    xkSchGrp.style.display="none";xkDiscGrp.style.display="none";xkCatGrp.style.display="none";
    renderCompare();return;
  }else if(view==='guide'){
    filters.forEach(function(e){e.style.display="none"});rankGrp.style.display="none";rankRes.style.display="none";
    btnSearch.style.display="none";btnReset.style.display="none";
    xkSchGrp.style.display="none";xkDiscGrp.style.display="none";xkCatGrp.style.display="none";
    document.body.style.overflow="auto";document.documentElement.style.overflow="auto";
    renderGuide();return;
  }else if(view==='toudang'){
    _rebuildYearChips(STATIC.toudangYears);
    YEARS=STATIC.toudangYears;
    // Show filters: school, major keyword, score, rank, year. Hide: province, subject
    document.getElementById("provWrap").style.display="none";
    document.getElementById("fltSubject").parentElement.style.display="none";
    document.getElementById("fltSchool").parentElement.style.display="";
    document.getElementById("fltMajor").parentElement.style.display="none";
    document.getElementById("fltMin").parentElement.style.display="";
    document.getElementById("fltMax").parentElement.style.display="";
    document.getElementById("fltRankMin").parentElement.style.display="";
    document.getElementById("fltRankMax").parentElement.style.display="";
    document.getElementById("fltRankMin").parentElement.nextElementSibling.style.display="";
    document.getElementById("yrChipGrp").style.display="";
    rankGrp.style.display="none";rankRes.style.display="none";
    btnSearch.style.display="";btnReset.style.display="";
    xkSchGrp.style.display="none";xkDiscGrp.style.display="none";xkCatGrp.style.display="none";
    if(!toudangRawData){loadToudangRaw(function(){searchToudang()})}else{searchToudang()}
    return;
  }else{
    filters.forEach(function(e){e.style.display="none"});btnSearch.style.display="none";btnReset.style.display="none";
    xkSchGrp.style.display="none";xkDiscGrp.style.display="none";xkCatGrp.style.display="none";
    rankGrp.style.display=view==='yiduan'?"":"none";if(view!=='yiduan')rankRes.style.display="none";
  }
  if(view==='admission'){if(currentData){rebuild();return}
    document.getElementById("main").innerHTML='<div class="msg">请在上方输入查询条件后点击"查询"按钮</div>';
    document.getElementById("statRow").textContent="输入条件后点击\"查询\"开始";
  }else if(view==='yiduan'){_rebuildYearChips(STATIC.yiduanYears);YEARS=STATIC.yiduanYears;loadYiduan()}
}

function acLocalMajor(q){var ql=q.toLowerCase(),r=[],MAX=30,s=new Set();

function getVal(it,field,year){if(field==='school')return it.school;if(field==='group_code')return it.group_code;if(field==='major')return it.major;var d=it.years[year];if(!d)return-1;if(field==='min'){var s=String(d.min||'');return parseFloat(s.replace(/[>≥]/g,''))||0}if(field==='avg')return d.avg!=null?d.avg:-1;if(field==='count')return d.count!=null?d.count:-1;return-1}

function getBestYearVal(item){var yrs=YEARS.slice().sort(function(a,b){return b-a});for(var i=0;i<yrs.length;i++){var d=item.years[yrs[i]];if(d){var v=parseFloat(String(d.min||"").replace(/[>≥]/g,""));if(v>0)return v}}return-1}
function doSort(items,field,year,dir){if(field==='default'){return items.sort(function(a,b){var va=getBestYearVal(a),vb=getBestYearVal(b);if(vb!==va)return dir==='desc'?vb-va:va-vb;var x=a.school.localeCompare(b.school,'zh');if(x!==0)return x;x=a.group_code.localeCompare(b.group_code);if(x!==0)return x;return a.major.localeCompare(b.major,'zh')})}return items.sort(function(a,b){var va=getVal(a,field,year),vb=getVal(b,field,year);if(field==='school'||field==='group_code'||field==='major'){var x=String(va).localeCompare(String(vb),'zh');return dir==='asc'?x:-x}if(vb!==va)return dir==='asc'?va-vb:vb-va;var x=a.school.localeCompare(b.school,'zh');if(x!==0)return x;x=a.group_code.localeCompare(b.group_code);if(x!==0)return x;return a.major.localeCompare(b.major,'zh')})}

        <div style="background:#f0f9ff;border-left:3px solid #0ea5e9;padding:10px 14px;border-radius:4px;font-size:12px;color:#0c4a6e;margin-top:8px">\
          <strong>📐 上海高考同分排序规则（本科普通批）：</strong>以下位序逐层比较，上一位序分出先后即停止。你可以根据自己各科成绩在同分考生中预估位置：<br>\
          　<strong>第1位序</strong>：语文 + 数学 两科合计分 → 高者优先<br>\
          　<strong>第2位序</strong>：语文或数学中的单科最高分 → 高者优先<br>\
          　<strong>第3位序</strong>：外语成绩 → 高者优先<br>\
          　<strong>第4位序</strong>：三门选考中的单科最高分 → 高者优先<br>\
          　<strong>第5位序</strong>：三门选考中的次高科成绩 → 高者优先<br>\
          　<strong>第6位序</strong>：志愿顺序（极少触发）<br>\
          如果你语数合计分高，在同分中排名<strong>靠前</strong>，排位取区间偏上部（数字更小）；反之取偏下部。\
        </div>\
      </div>\
    </div>\
\
    <!-- Step 2 -->\
    <div style="display:flex;gap:16px;margin-bottom:32px">\
      <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;counter-increment:step"><span></span>2</div>\
      <div style="flex:1">\
        <h3 style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">用排位反查往年对应分数</h3>\
        <p style="font-size:13px;color:#64748b;margin-bottom:6px">在「一分一段」表中，根据上一步确定的排位，<strong>横向对比</strong>各年份该排位附近对应的分数。例如：2026 年排位 5000 名 ≈ 2025 年多少分？</p>\
        <p style="font-size:13px;color:#64748b">观察各年份的累计人数列，找到<strong>最接近你排位的那个分数段</strong>，记录下来作为该年的"等效分数"。</p>\
      </div>\
    </div>\
\
    <!-- Step 3 -->\
    <div style="display:flex;gap:16px;margin-bottom:32px">\
      <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;counter-increment:step"><span></span>3</div>\
      <div style="flex:1">\
        <h3 style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">在录取数据中搜索匹配</h3>\
        <p style="font-size:13px;color:#64748b;margin-bottom:6px">切换到 <strong>「录取数据」</strong> 选项卡：</p>\
        <ul style="font-size:13px;color:#64748b;padding-left:20px;margin-bottom:6px">\
          <li>在"从"和"到"位次框中输入排位范围来筛选（无需在意顺序，系统会自动识别）</li>\
          <li>可同时设置"最低分"范围来交叉筛选</li>\
          <li>通过"省份"下拉框筛选目标地区</li>\
          <li>通过"专业关键词"查找感兴趣的专业方向</li>\
          <li>点击年份标签可选择只看某几年的数据</li>\
        </ul>\
        <div style="background:#fffbeb;border-left:3px solid #f59e0b;padding:8px 12px;border-radius:4px;font-size:12px;color:#92400e">\
          💡 设置技巧：先用较小的区间（如从 4000 到 6000）看精确匹配，没有满意结果再拉大区间。\
          排位越靠前（如前 2000 名），下界可以设得越小（甚至不填）；排位靠后（如 20000 名以后），上界应该设得更大。\
          两个框输入顺序无所谓，系统会自动取较小的数字作为下限、较大的作为上限。\
        </div>\
      </div>\
    </div>\
\
    <!-- Step 4 -->\
    <div style="display:flex;gap:16px;margin-bottom:32px">\
      <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;counter-increment:step"><span></span>4</div>\
      <div style="flex:1">\
        <h3 style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">加入对比列表</h3>\
        <p style="font-size:13px;color:#64748b;margin-bottom:6px">在搜索结果中，<strong>右键点击</strong>感兴趣的院校专业行，选择"添加到对比列表"。可以跨年份、跨专业添加多条记录。</p>\
        <p style="font-size:13px;color:#64748b">你也可以切换到 <strong>「投档线」</strong> 选项卡查看各专业组的最低录取分和同分排序细节（语数外、选考科目等小分），帮助你判断自己在同分考生中的竞争力。</p>\
      </div>\
    </div>\
\
    <!-- Step 5 -->\
    <div style="display:flex;gap:16px;margin-bottom:32px">\
      <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;counter-increment:step"><span></span>5</div>\
      <div style="flex:1">\
        <h3 style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">分析对比结果</h3>\
        <p style="font-size:13px;color:#64748b;margin-bottom:6px">切换到 <strong>「对比列表」</strong> 选项卡，查看你收藏的所有院校专业在各年份的录取数据：</p>\
        <ul style="font-size:13px;color:#64748b;padding-left:20px;margin-bottom:6px">\
          <li><strong>录取分数趋势</strong>：该专业近几年最低分是上升还是下降？分数上升意味着竞争加剧</li>\
          <li><strong>招生人数变化</strong>：录取人数是在扩大还是缩小？缩招意味着来年可能更难进</li>\
          <li><strong>是否持续招生</strong>：有年份显示"—"说明该年未招生，需要关注今年的招生计划</li>\
          <li><strong>排位波动</strong>：最低排位是否稳定？大幅波动可能意味着大小年现象</li>\
        </ul>\
        <p style="font-size:13px;color:#64748b">对比列表数据会自动保存在浏览器中，关闭窗口不会丢失。确定最终志愿后可以清空列表。</p>\
      </div>\
    </div>\
\
    <!-- Additional tips -->\
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;margin-top:8px">\
      <h3 style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:10px">💡 补充技巧</h3>\
      <ul style="font-size:13px;color:#64748b;padding-left:20px;line-height:2">\
        <li><strong>学科评估参考</strong>：切换到「学科评估」选项卡，查看目标院校在你感兴趣的专业领域的评估等级（A+ 最强），帮助判断专业实力</li>\
        <li><strong>科目要求</strong>：在录取数据中使用"科目"下拉框筛选，确保你的选考科目符合目标专业的报考要求</li>\
        <li><strong>多窗口对比</strong>：您可以同时打开两个浏览器窗口（如并排显示），一个查看录取数据，另一个查看一分一段表</li>\
        <li><strong>省份筛选</strong>：如果只考虑上海高校，可以在省份下拉框中只勾选"上海"，缩小搜索范围</li>\
        <li><strong>排序分析</strong>：点击表头可按最低分、均分等排序，快速找到分数匹配的院校区间</li>\
      </ul>\
    </div>\
\
  </div>\
</div>';
}

// ── Column sync ──
var _syncColsTimer=null;
function syncCols(){if(_syncColsTimer){clearTimeout(_syncColsTimer)}_syncColsTimer=setTimeout(function(){_syncColsTimer=null;
  var o=document.querySelector('.tblOuter');if(!o)return;var hd=o.querySelector('.tblHd'),bd=o.querySelector('.tblBd');if(!hd||!bd)return;
  var bRow=bd.querySelector('tbody tr:first-child'),hRow=hd.querySelector('thead tr:last-child');if(!bRow||!hRow)return;
  var bC=bRow.querySelectorAll('td'),hC=hRow.querySelectorAll('th');var m=Math.min(bC.length,hC.length);
  for(var i=0;i<m;i++){var w=Math.max(bC[i].offsetWidth,hC[i].offsetWidth)+'px';bC[i].style.width=w;bC[i].style.minWidth=w;hC[i].style.width=w;hC[i].style.minWidth=w}},80)}

init();
</script>
</body>
</html>
